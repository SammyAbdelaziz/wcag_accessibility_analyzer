name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile Python sources
        run: python -m compileall function_app.py wcag tests

      - name: Run repo-safe test gate
        env:
          WCAG_DISABLE_RENDERED_HTML: '1'
        run: |
          pytest -q \
            tests/test_confidence_contract_audit.py \
            tests/test_docx_rules_unit.py \
            tests/test_pptx_rules_unit.py \
            tests/test_xlsx_rules_unit.py \
            tests/test_phase_h_rules.py \
            tests/test_phase_m_net_new.py \
            tests/test_milestone_ad_analysis_hardening.py

      - name: Verify Docker image builds
        run: docker build -t wcag-analyzer:ci .