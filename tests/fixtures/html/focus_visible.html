<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Visible Indicators Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        /* Buttons WITH proper focus styles */
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        
        /* Proper focus indicator with outline */
        button:focus {
            outline: 3px solid #ff6b35;
            outline-offset: 2px;
        }
        
        /* Alternative: focus-visible for keyboard-only focus */
        button:focus-visible {
            outline: 3px solid #ff6b35;
            outline-offset: 2px;
        }
        
        input[type="text"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        
        /* Focus indicator for input with box-shadow */
        input[type="text"]:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.25);
            outline: none;
        }
        
        a {
            color: #007bff;
            text-decoration: none;
        }
        
        /* Focus indicator for links */
        a:focus {
            outline: 2px solid #ff6b35;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <h1>Form with Visible Focus Indicators</h1>
    
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name">
        
        <label for="email">Email:</label>
        <input type="text" id="email" name="email" placeholder="Enter your email">
        
        <button type="submit">Submit Form</button>
        <button type="reset">Clear</button>
    </form>
    
    <p><a href="#">Click here for more information</a></p>
</body>
</html>
