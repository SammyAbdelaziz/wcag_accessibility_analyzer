<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Order - Pass</title>
    <style>
        body { font-family: Arial, sans-serif; }
        a { color: blue; text-decoration: underline; margin: 10px; }
    </style>
</head>
<body>
    <h1>Focus Order with Natural DOM Order</h1>
    <p>This page follows natural DOM order for focus:</p>
    
    <!-- No positive tabindex; focus follows DOM order -->
    <a href="#">First Link</a>
    <a href="#">Second Link</a>
    <a href="#">Third Link</a>
    
    <p>Pressing Tab navigates in visual/DOM order: 1st, 2nd, 3rd. This is expected and predictable.</p>
</body>
</html>
