<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard Trap - Fail</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .modal {
            background: white;
            border: 2px solid red;
            padding: 20px;
            width: 300px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Modal Trap Example</h1>
    <p>This modal has a single input field with no close button or escape mechanism - keyboard users are trapped:</p>
    
    <div class="modal">
        <h2>Trapped Modal</h2>
        <p>Enter data here:</p>
        <input type="text" placeholder="Single input field">
        <p><em>Keyboard users cannot escape this modal - no close button, no Escape key handler.</em></p>
    </div>
</body>
</html>
